<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPA / CGPA Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>CodeWithSaadat</h1>
        <h2>GPA / CGPA Calculator (Out of 4.00)</h2>

        <div id="subjects">
            <div class="subject">
                <input type="number" step="0.01" min="0" max="4" placeholder="Enter GPA for Subject 1">
            </div>
            <div class="subject">
                <input type="number" step="0.01" min="0" max="4" placeholder="Enter GPA for Subject 2">
            </div>
            <div class="subject">
                <input type="number" step="0.01" min="0" max="4" placeholder="Enter GPA for Subject 3">
            </div>
            <div class="subject">
                <input type="number" step="0.01" min="0" max="4" placeholder="Enter GPA for Subject 4">
            </div>
        </div>

        <button onclick="addSubject()">Add Subject</button>
        <button onclick="calculateCGPA()">Calculate GPA/CGPA</button>

        <div id="result"></div>
    </div>

    <script src="script.js"></script>

</body>
</html>
